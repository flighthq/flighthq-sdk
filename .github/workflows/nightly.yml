name: Nightly quality

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  verify:
    name: Verify and build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run verify

  api:
    name: API generation
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run api
      - run: npm run api:json
